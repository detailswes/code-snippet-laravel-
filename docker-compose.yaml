
networks:
    app-network:
        driver: bridge
services:
    app:
        build:
            context: ./
            dockerfile: Dockerfile
        image: laravel9-php-fpm-80
        container_name: laravel_snippet
        restart: unless-stopped
        tty: true
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network

    mysql:
        image: mysql:8.0
        container_name: mysql_admin_users
        restart: unless-stopped
        env_file: .env
        tty: true
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root_secret}'
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        ports:
            - 3308:3306
        volumes:
            - ./mysql/data:/var/lib/mysql
        networks:
            - app-network

    nginx:
        image: nginx:1.19.8-alpine
        container_name: nginx_admin_users
        restart: unless-stopped
        tty: true
        ports:
            - 7200:80
        volumes:
            - ./:/var/www
            - ./nginx/conf:/etc/nginx/conf.d
        networks:
            - app-network

    phpmyadmin:
        image: phpmyadmin:5.1.0-apache
        container_name: phpmyadmin_admin_users
        restart: unless-stopped
        ports:
            - 127.0.0.1:7100:80
        environment:
            PMA_HOST: mysql
            MAX_EXECUTION_TIME: 1000
            MEMORY_LIMIT: 1024M
            UPLOAD_LIMIT: 1024M
        networks:
            - app-network
